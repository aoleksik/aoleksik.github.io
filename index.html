<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Agnieszka - Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; background-color: #050505; font-family: 'Playfair Display', serif; overscroll-behavior: none; }
        
        #loader { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #050505; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.8s ease, visibility 0.8s ease; }
        .loader-text { font-family: 'Lato', sans-serif; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 3px; color: #fff; animation: pulse 1.5s infinite alternate; }
        @keyframes pulse { 0% { opacity: 0.4; } 100% { opacity: 1; } }
        #loader.hidden { opacity: 0; visibility: hidden; }

        #media-wall { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; display: flex; flex-direction: column; justify-content: center; z-index: 1; opacity: 0; transition: opacity 0.6s ease, filter 0.6s ease; overflow: hidden; }
        .grid-row { display: flex; height: 25vh; width: max-content; will-change: transform; padding: 10px 0; box-sizing: border-box; }
        .track { display: flex; align-items: center; height: 100%; gap: 20px; padding: 0 10px; }
        .media-item { height: 100%; width: auto; border-radius: 12px; cursor: pointer; box-shadow: 0 8px 25px rgba(0,0,0,0.5); transition: opacity 0.5s ease, filter 0.5s ease, transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .media-item:hover { transform: scale(1.04); filter: brightness(1.1); z-index: 5; }

        #top-navigation { position: fixed; top: 40px; right: 40px; z-index: 30; display: flex; align-items: center; flex-wrap: wrap; justify-content: flex-end; gap: 10px; pointer-events: auto; opacity: 0; transition: opacity 1s ease 0.5s; }
        .nav-pill { background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); color: #fff; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; gap: 6px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .nav-pill.main-cat { font-family: 'Playfair Display', serif; font-size: 1.2rem; font-style: italic; padding: 8px 22px; border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.3); }
        .nav-pill.sub-cat { font-family: 'Lato', sans-serif; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1.5px; padding: 8px 18px; border-radius: 6px; border: 1px solid rgba(255, 255, 255, 0.15); }
        .nav-pill:hover { background: rgba(255, 255, 255, 0.15); border-color: rgba(255, 255, 255, 0.6); }
        .nav-pill.main-cat.active { background: rgba(255, 255, 255, 0.1); color: #fff; border-color: #fff; }
        .nav-pill.sub-cat.active { background: #fff; color: #000; font-weight: bold; }
        .close-x { font-family: 'Lato', sans-serif; font-style: normal; margin-right: 2px; font-weight: 400; }
        .nav-separator { color: rgba(255, 255, 255, 0.4); font-family: 'Lato', sans-serif; font-size: 1.5rem; margin: 0 5px; user-select: none; }
        .mobile-break { display: none; }

        #center-brand { position: fixed; z-index: 10; color: #ffffff; display: flex; flex-direction: column; pointer-events: none; opacity: 0; transition: opacity 1s ease 0.3s; }
        #profile-pic { width: 140px; height: 140px; border-radius: 50%; object-fit: cover; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8); pointer-events: auto; margin-bottom: 15px; }
        h1 { font-size: 3.5rem; margin: 0 0 15px 0; font-weight: 700; letter-spacing: 1px; text-shadow: 0 4px 20px rgba(0,0,0,0.9); }
        .contact-info { font-family: 'Lato', sans-serif; font-size: 1.05rem; font-weight: 400; line-height: 1.8; pointer-events: auto; background: rgba(0, 0, 0, 0.65); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); padding: 20px 25px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.15); box-shadow: 0 10px 30px rgba(0,0,0,0.5); cursor: text; }
        .contact-info strong { color: #fff; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; font-size: 0.9rem; display: block; margin-bottom: 8px; opacity: 0.8; }
        .contact-info a { color: #fff; text-decoration: none; border-bottom: 1px solid rgba(255,255,255,0.3); transition: all 0.3s; display: inline-block; margin-bottom: 5px; cursor: pointer; }
        .contact-info a:hover { border-bottom: 1px solid #fff; }
        .quick-select { user-select: all; -webkit-user-select: all; }

        @media (min-width: 769px) {
            #center-brand { top: 50%; right: 8vw; transform: translateY(-50%); align-items: flex-end; text-align: right; background: radial-gradient(ellipse at right, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0) 70%); padding: 60px 40px 60px 100px; }
            .contact-info { text-align: right; }
        }
        @media (max-width: 768px) {
            #top-navigation { top: 20px; right: 20px; left: 20px; justify-content: center; gap: 8px; }
            .mobile-break { display: block; flex-basis: 100%; height: 0; margin: 0; padding: 0; }
            #center-brand { top: 55%; left: 50%; transform: translate(-50%, -50%); align-items: center; text-align: center; background: radial-gradient(circle, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0) 70%); padding: 30px 20px; width: 100%; box-sizing: border-box; }
            h1 { font-size: 2.5rem; } #profile-pic { width: 110px; height: 110px; } .grid-row { height: 20vh; padding: 5px 0; } .track { gap: 10px; } 
            .contact-info { width: 90%; max-width: 350px; padding: 15px; text-align: center; } 
        }

        #lightbox { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(10px); z-index: 100; display: none; flex-direction: column; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.4s ease; cursor: default; }
        #lightbox-img { max-width: 90vw; max-height: 55vh; border-radius: 8px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); object-fit: contain; margin-bottom: 15px; }
        #lb-description { color: rgba(255, 255, 255, 0.9); font-family: 'Lato', sans-serif; font-weight: 300; font-size: 1rem; line-height: 1.6; max-width: 600px; text-align: center; margin: 0 20px 20px 20px; display: none; }
        .close-icon { position: absolute; top: 30px; right: 40px; font-size: 3rem; color: #fff; cursor: pointer; font-family: sans-serif; line-height: 1; }
        .lb-ui-container { display: flex; flex-direction: column; align-items: center; gap: 15px; background: rgba(255,255,255,0.05); padding: 20px 30px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); }
        .lb-prompt { color: rgba(255,255,255,0.6); font-family: 'Lato', sans-serif; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 2px; }
        .lightbox-controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; justify-content: center; }
        .btn { cursor: pointer; transition: all 0.3s; display: flex; align-items: center; justify-content: center; height: 42px; box-sizing: border-box; }
        .btn-main-cat { background: #fff; color: #000; border: none; font-family: 'Playfair Display', serif; font-size: 1.2rem; font-style: italic; padding: 8px 24px; border-radius: 30px; }
        .btn-main-cat:hover { background: #e0e0e0; }
        .btn-sub-cat { background: rgba(0, 0, 0, 0.7); color: #fff; border: 1px solid rgba(255,255,255,0.3); font-family: 'Lato', sans-serif; font-size: 0.8rem; font-weight: bold; letter-spacing: 1.5px; text-transform: uppercase; padding: 8px 18px; border-radius: 6px; }
        .btn-sub-cat:hover { background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.6); }
        .btn-close-lb { background: transparent; color: rgba(255,255,255,0.6); border: none; font-family: 'Lato', sans-serif; font-size: 0.8rem; text-decoration: underline; margin-top: 10px; height: auto; }
        .btn-close-lb:hover { color: #fff; }
    </style>
</head>
<body>

    <div id="loader">
        <span class="loader-text" id="loader-display"></span>
    </div>

    <div id="top-navigation"></div>

    <div id="media-wall"></div>

    <div id="center-brand">
        <img id="profile-pic" src="" alt="Profile">
        <h1 id="brand-name"></h1>
        <div class="contact-info" id="contact-container"></div>
    </div>

    <div id="lightbox">
        <span class="close-icon" onclick="closeLightbox()">&times;</span>
        <img id="lightbox-img" src="" alt="Powiększone dzieło">
        <div id="lb-description"></div>
        <div class="lb-ui-container">
            <span class="lb-prompt">Filtruj ścianę:</span>
            <div class="lightbox-controls">
                <button class="btn btn-main-cat" id="btn-lb-main" onclick="filterFromLightbox('main')"></button>
                <span class="nav-separator">›</span>
                <button class="btn btn-sub-cat" id="btn-lb-sub" onclick="filterFromLightbox('sub')"></button>
            </div>
            <button class="btn btn-close-lb" onclick="closeLightbox()">Wróć do przeglądania</button>
        </div>
    </div>

    <script src="config.js"></script>

    <script>
        let portfolioData = [];
        const wallContainer = document.getElementById('media-wall');
        const navContainer = document.getElementById('top-navigation');
        const totalRows = window.innerWidth < 768 ? 5 : 4;
        let rowControllers = []; 
        let isLightboxOpen = false;
        let activeMainFilter = null;
        let activeSubFilter = null;

        function injectConfigData() {
            if (typeof PORTFOLIO_CONFIG === 'undefined') {
                alert("Błąd: Nie znaleziono pliku config.js!");
                return;
            }

            document.getElementById('loader-display').innerText = PORTFOLIO_CONFIG.loaderText;
            document.getElementById('profile-pic').src = PORTFOLIO_CONFIG.profilePicture;
            document.getElementById('brand-name').innerText = PORTFOLIO_CONFIG.profileName;
            document.getElementById('contact-container').innerHTML = PORTFOLIO_CONFIG.contactInfoHTML;
            
            portfolioData = PORTFOLIO_CONFIG.mediaData;

            preloadImagesAndInit();
        }

        function preloadImagesAndInit() {
            let loadedCount = 0;
            const sourcesToLoad = portfolioData.map(item => item.src);
            sourcesToLoad.push(PORTFOLIO_CONFIG.profilePicture); 
            
            const uniqueSources = [...new Set(sourcesToLoad)];
            const totalToLoad = uniqueSources.length;

            if (totalToLoad === 0) { initPortfolio(); return; }

            uniqueSources.forEach(src => {
                const img = new Image();
                img.src = src;
                img.onload = checkDone;
                img.onerror = checkDone; 
                if (img.complete) checkDone();
            });

            function checkDone() {
                loadedCount++;
                if (loadedCount >= totalToLoad) initPortfolio();
            }
        }

        function initPortfolio() {
            renderNavigation(); 
            createGrid(portfolioData); 
            renderLerp(); 

            document.getElementById('loader').classList.add('hidden');
            setTimeout(() => {
                wallContainer.style.opacity = '1';
                document.getElementById('center-brand').style.opacity = '1';
                document.getElementById('top-navigation').style.opacity = '1';
            }, 300);
        }

        function renderNavigation() {
            navContainer.innerHTML = '';
            if (!activeMainFilter) {
                const mainCats = [...new Set(portfolioData.map(item => item.mainCat))];
                mainCats.forEach(cat => {
                    navContainer.innerHTML += `<div class="nav-pill main-cat" onclick="applyFilter('${cat}', null)">${cat}</div>`;
                });
            } else if (activeMainFilter && !activeSubFilter) {
                let html = `<div class="nav-pill main-cat active" onclick="applyFilter(null, null)"><span class="close-x">✕</span> ${activeMainFilter}</div>
                            <span class="nav-separator">›</span>
                            <div class="mobile-break"></div>`;
                
                const relevantSubCats = [...new Set(portfolioData.filter(item => item.mainCat === activeMainFilter).map(item => item.subCat))];
                relevantSubCats.forEach(sub => {
                    html += `<div class="nav-pill sub-cat" onclick="applyFilter('${activeMainFilter}', '${sub}')">${sub}</div>`;
                });
                navContainer.innerHTML = html;
            } else {
                let html = `<div class="nav-pill main-cat active" onclick="applyFilter(null, null)"><span class="close-x">✕</span> ${activeMainFilter}</div>
                            <span class="nav-separator">›</span>
                            <div class="mobile-break"></div>`;
                
                const relevantSubCats = [...new Set(portfolioData.filter(item => item.mainCat === activeMainFilter).map(item => item.subCat))];
                relevantSubCats.forEach(sub => {
                    let isActive = (sub === activeSubFilter);
                    let clickLogic = isActive ? `applyFilter('${activeMainFilter}', null)` : `applyFilter('${activeMainFilter}', '${sub}')`;
                    html += `<div class="nav-pill sub-cat ${isActive ? 'active' : ''}" onclick="${clickLogic}">${sub}</div>`;
                });
                navContainer.innerHTML = html;
            }
        }

        function applyFilter(main, sub) {
            activeMainFilter = main;
            activeSubFilter = sub;
            renderNavigation();

            wallContainer.style.opacity = '0';
            wallContainer.style.filter = 'blur(10px)';

            setTimeout(() => {
                rowControllers.forEach(brain => brain.animation.cancel());
                rowControllers = [];
                wallContainer.innerHTML = '';

                let filteredData = portfolioData.filter(item => {
                    if (main && sub) return item.mainCat === main && item.subCat === sub;
                    if (main) return item.mainCat === main;
                    return true;
                });

                createGrid(filteredData);
                
                requestAnimationFrame(() => {
                    wallContainer.style.opacity = '1';
                    wallContainer.style.filter = 'blur(0px)';
                });
            }, 600); 
        }

        function shuffleArray(array) {
            let shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        function createGrid(dataToRender) {
            if (dataToRender.length === 0) dataToRender = portfolioData;

            for (let i = 0; i < totalRows; i++) {
                const row = document.createElement('div');
                row.className = 'grid-row';

                const track1 = document.createElement('div'); const track2 = document.createElement('div');
                track1.className = 'track'; track2.className = 'track';
                
                let extendedData = [];
                while (extendedData.length < 20) { 
                    let freshBatch = shuffleArray(dataToRender);
                    if (extendedData.length > 0 && freshBatch.length > 1) {
                        if (extendedData[extendedData.length - 1].src === freshBatch[0].src) {
                            let temp = freshBatch[0];
                            freshBatch[0] = freshBatch[1];
                            freshBatch[1] = temp;
                        }
                    }
                    extendedData = extendedData.concat(freshBatch);
                }

                extendedData.forEach(itemData => {
                    track1.appendChild(createMediaElement(itemData));
                    track2.appendChild(createMediaElement(itemData));
                });

                row.appendChild(track1); row.appendChild(track2);
                wallContainer.appendChild(row);

                let keyframes = (i % 2 === 0) ? [{ transform: 'translateX(0)' }, { transform: 'translateX(-50%)' }] : [{ transform: 'translateX(-50%)' }, { transform: 'translateX(0)' }];
                let anim = row.animate(keyframes, { duration: 200000, iterations: Infinity, easing: 'linear' });
                let rowBrain = { animation: anim, targetSpeed: 1, currentSpeed: 1 };
                rowControllers.push(rowBrain);

                row.addEventListener('mouseenter', () => rowBrain.targetSpeed = 0);
                row.addEventListener('mouseleave', () => rowBrain.targetSpeed = 1);
                row.addEventListener('touchstart', () => rowBrain.targetSpeed = 0, {passive: true});
                row.addEventListener('touchend', () => rowBrain.targetSpeed = 1);
            }
        }

        function createMediaElement(itemData) {
            let el = document.createElement('img');
            el.src = itemData.src; el.className = 'media-item';
            el.addEventListener('click', () => openLightbox(itemData));
            return el;
        }

        function renderLerp() {
            rowControllers.forEach(brain => {
                let actualTarget = isLightboxOpen ? 0 : brain.targetSpeed;
                brain.currentSpeed += (actualTarget - brain.currentSpeed) * 0.05; 
                brain.animation.playbackRate = brain.currentSpeed;
            });
            requestAnimationFrame(renderLerp);
        }

        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const lbDescription = document.getElementById('lb-description');
        const btnLbMain = document.getElementById('btn-lb-main');
        const btnLbSub = document.getElementById('btn-lb-sub');
        
        let lbCurrentMain = "";
        let lbCurrentSub = "";

        lbDescription.addEventListener('click', function(e) { e.stopPropagation(); });

        lightbox.addEventListener('click', function(e) {
            if (e.target === lightbox) { closeLightbox(); }
        });

        function openLightbox(itemData) {
            lightboxImg.src = itemData.src;
            lbCurrentMain = itemData.mainCat;
            lbCurrentSub = itemData.subCat;
            
            btnLbMain.innerHTML = itemData.mainCat;
            btnLbSub.innerHTML = itemData.subCat;
            
            if (itemData.description) {
                lbDescription.innerText = itemData.description;
                lbDescription.style.display = 'block'; 
            } else {
                lbDescription.innerText = '';
                lbDescription.style.display = 'none'; 
            }
            
            lightbox.style.display = 'flex';
            setTimeout(() => { lightbox.style.opacity = '1'; }, 10);
            isLightboxOpen = true; 
        }

        function closeLightbox() {
            lightbox.style.opacity = '0';
            setTimeout(() => { lightbox.style.display = 'none'; }, 400);
            isLightboxOpen = false; 
        }

        function filterFromLightbox(level) {
            closeLightbox();
            if (level === 'main') applyFilter(lbCurrentMain, null);
            else if (level === 'sub') applyFilter(lbCurrentMain, lbCurrentSub);
        }

        injectConfigData(); 
    </script>
</body>
</html>
